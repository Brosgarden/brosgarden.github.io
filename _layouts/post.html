---
layout: default
---
<article class="post h-entry">
  <header class="post-header">
    <h1 class="post-title p-name">{{ page.title | escape }}</h1>
    <p class="post-meta">
      <time class="dt-published" datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%d %b %Y" }}</time>
      {% if page.categories.size > 0 %}
        <span class="post-categories" aria-hidden="true"> · </span>
        {{ page.categories | join: ", " }}
      {% endif %}
    </p>
  </header>
  <div class="post-content prose e-content">
    {{ content }}
  </div>
</article>
